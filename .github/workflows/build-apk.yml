name: Build Vantus
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx expo export --platform web
      - uses: actions/upload-artifact@v4
        with:
          name: Vantus-Web-App
          path: dist/
