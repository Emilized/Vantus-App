name: Build Vantus APK
on: [push, workflow_dispatch]

env:
  # This tells GitHub to ignore the Node 20/24 version conflict
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 2026 compatible

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tools
        run: |
          npm install -g expo-cli
          npm install

      - name: Build Android
        run: |
          npx expo prebuild --platform android --no-install
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vantus-Final-APK
          path: android/app/build/outputs/apk/release/*.apk
